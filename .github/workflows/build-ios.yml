# Windows'tan Mac olmadan: GitHub'ın ücretsiz macOS runner'ında iOS derlenir.
# IPA artifact olarak indirilir veya (isteğe bağlı) TestFlight'a yüklenir.
# Rehber: IOS_BUILD_REHBERI.md

name: Build iOS (IPA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_for_testflight:
        description: 'TestFlight için build (app-store). Distribution sertifikanız varsa işaretleyin.'
        required: false
        default: true
        type: boolean

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Android için Flutter)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode and install certificate
        id: cert
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "BUILD_CERTIFICATE_BASE64 secret tanımlı değil, imzasız build atlanıyor."
            echo "IPA oluşturmak için repo Secrets'a sertifika ekleyin. Bkz. IOS_BUILD_REHBERI.md"
            echo "installed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychain -d user | tr '\n' ' ')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "installed=true" >> $GITHUB_OUTPUT
          echo "Keychain'deki imza kimlikleri:"
          security find-identity -v -p codesigning

      - name: Decode and install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          if [ -z "$BUILD_PROVISION_PROFILE_BASE64" ]; then
            echo "BUILD_PROVISION_PROFILE_BASE64 secret tanımlı değil."
            exit 0
          fi
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          # Push ile tetiklenince input yok; sadece 'false' ise development, yoksa app-store (Distribution cert)
          FOR_TESTFLIGHT: ${{ github.event.inputs.build_for_testflight }}
        run: |
          mkdir -p ios
          if [ -n "$TEAM_ID" ] && [ -n "$PROFILE_NAME" ]; then
            if [ "$FOR_TESTFLIGHT" = "false" ]; then
              METHOD="development"
            else
              METHOD="app-store"
            fi
            cat > ios/ExportOptions.plist << PLIST
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                <key>com.nida.nidaFlutter</key>
                <string>${PROFILE_NAME}</string>
              </dict>
            </dict>
            </plist>
            PLIST
            echo "ExportOptions.plist oluşturuldu (method: $METHOD, team: $TEAM_ID, profile: $PROFILE_NAME)."
          else
            echo "APPLE_TEAM_ID veya PROVISIONING_PROFILE_NAME secret yok. Bkz. IOS_BUILD_REHBERI.md"
          fi

      - name: Prepare keychain for build (unlock + default)
        if: steps.cert.outputs.installed == 'true'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "Keychain hazır. Mevcut imza kimlikleri:"
          security find-identity -v -p codesigning

      # Flutter bug: code_signing.dart sadece "Developer"/"Development" arıyor, "Apple Distribution" atlıyor (flutter/flutter#176636)
      - name: Patch Flutter code_signing (Apple Distribution workaround)
        if: steps.cert.outputs.installed == 'true'
        run: |
          FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))
          FILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/ios/code_signing.dart"
          # Sadece _securityFindIdentityDeveloperIdentityExtractionPattern regex satırında değiştir (ilk Develop=error mesajına dokunma)
          sed -i '' '/_securityFindIdentityDeveloperIdentityExtractionPattern/,/^);$/ s/Develop(ment|er)/(?:Develop(ment|er)|Distribution)/' "$FILE"
          echo "Regex line after patch:"
          grep -n "securityFindIdentityDeveloperIdentityExtractionPattern\|r'.*Develop\|Distribution" "$FILE" | head -6
          echo "Patched $FILE for Apple Distribution certificate"

      - name: Build and Sign IPA
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }} # Eğer UUID yoksa aşağıya bak
        run: |
          echo "1. Adım: Imzasız Frameworkleri Derle"
          flutter build ios --release --no-codesign
          
          echo "2. Adım: Xcode ile Arşivle"
          # Burada TEAM_ID'yi zorla içeri itiyoruz
          xcodebuild -workspace ios/Runner.xcworkspace \
                     -scheme Runner \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath $RUNNER_TEMP/Runner.xcarchive \
                     DEVELOPMENT_TEAM=$TEAM_ID \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     CODE_SIGN_STYLE=Manual \
                     archive
          
          echo "3. Adım: IPA'ya Dönüştür (Export)"
          xcodebuild -exportArchive \
                     -archivePath $RUNNER_TEMP/Runner.xcarchive \
                     -exportOptionsPlist ios/ExportOptions.plist \
                     -exportPath build/ios/ipa

      - name: Upload IPA artifact
        if: success() && hashFiles('build/ios/ipa/*.ipa') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Build status
        if: always()
        run: |
          if [ -d "build/ios/ipa" ] && ls build/ios/ipa/*.ipa 1>/dev/null 2>&1; then
            echo "IPA başarıyla oluşturuldu. Actions sekmesinden artifact olarak indirebilirsiniz."
          else
            echo "IPA oluşturulamadı. İmza için Secrets ayarlarını kontrol edin (IOS_BUILD_REHBERI.md)."
          fi
